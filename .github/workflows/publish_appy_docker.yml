name: Publish Appy Support docker images

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. v1.2.3 or custom)'
        required: true

env:
  DOCKER_REPO: ghcr.io/appy-design/chatwoot

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set Chatwoot edition (EE retained)
        run: |
          echo -en '\nENV CW_EDITION="ee"' >> docker/Dockerfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.DOCKER_REPO }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        run: |
          TAGS=()
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAGS+=("${DOCKER_REPO}:pr-${{ github.event.number }}")
          elif [ "${{ github.event_name }}" = "push" ]; then
            REF="${{ github.ref_name }}"
            TAGS+=("${DOCKER_REPO}:${REF}")
            TAGS+=("${DOCKER_REPO}:latest")
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAGS+=("${DOCKER_REPO}:${{ inputs.tag }}")
          fi
          echo "tags=${TAGS[*]}" >> $GITHUB_OUTPUT

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          TAG_ARGS=""
          for tag in ${{ steps.tags.outputs.tags }}; do
            TAG_ARGS="$TAG_ARGS -t $tag"
          done
          docker buildx imagetools create $TAG_ARGS \
            $(printf '${{ env.DOCKER_REPO }}@sha256:%s ' *)

      - name: Inspect first tag
        run: |
          FIRST_TAG=$(echo "${{ steps.tags.outputs.tags }}" | awk '{print $1}')
          docker buildx imagetools inspect "$FIRST_TAG"
